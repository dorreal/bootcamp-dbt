# ============================================================
# packages.yml — Dependencias externas del bootcamp
# ============================================================
# Después de modificar este archivo, corre:  dbt deps
#
# En dbt Cloud, el comando se ejecuta automáticamente antes de
# cada `dbt run` desde la versión 2024, pero es bueno saberlo.
# ============================================================

packages:
  # ─── dbt_utils ──────────────────────────────────────────
  # El package más usado del ecosistema. Macros útiles:
  #   - generate_surrogate_key()  (lab 4: claves combinadas)
  #   - star()                    (lab 5: SELECT * sin columnas)
  #   - pivot()                   (lab 6)
  #   - get_column_values()       (lab 7)
  - package: dbt-labs/dbt_utils
    version: [">=1.1.0", "<2.0.0"]

  # ─── dbt_expectations ───────────────────────────────────
  # Tests inspirados en Great Expectations.
  # Lab 11: data quality framework avanzado.
  - package: calogica/dbt_expectations
    version: [">=0.10.0", "<0.11.0"]

  # ─── dbt_date ───────────────────────────────────────────
  # Macros para manejo de fechas y dimensiones de tiempo.
  # Lab 6: dim_date.
  - package: calogica/dbt_date
    version: [">=0.10.0", "<0.11.0"]

  # ─── codegen ────────────────────────────────────────────
  # Genera código boilerplate automáticamente
  # (source YAML, staging models, etc).
  # Usar `dbt run-operation generate_source --args ...`
  # Lab 2: setup automático de sources.
  - package: dbt-labs/codegen
    version: [">=0.13.0", "<0.14.0"]

  # ─── audit_helper ───────────────────────────────────────
  # Compara dos modelos para validar refactors (data diff).
  # Lab 14: refactoring seguro de modelos críticos.
  - package: dbt-labs/audit_helper
    version: [">=0.12.0", "<0.13.0"]

# ============================================================
# ⚠️ ERRORES TÍPICOS DE PRINCIPIANTE
# ============================================================
# 1) Fijar una versión exacta:
#    Mal:  version: 1.1.1     (frágil, no recibe parches)
#    Bien: version: [">=1.1.0", "<2.0.0"]
#
# 2) Olvidar correr `dbt deps` tras editar el archivo:
#    El package no se descarga solo (excepto en dbt Cloud
#    desde 2024). En CLI, el primer `dbt run` fallará con
#    "package not found".
#
# 3) Commitear la carpeta `dbt_packages/`:
#    Es código de terceros que se reinstala con `dbt deps`.
#    Agrégala a .gitignore.
#
# 4) Usar versiones incompatibles entre packages:
#    dbt_expectations depende de dbt_utils. Si fijas
#    versiones incompatibles, `dbt deps` falla.
#    Solución: usa rangos amplios y deja que dbt resuelva.
# ============================================================
