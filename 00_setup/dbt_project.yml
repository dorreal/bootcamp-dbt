# ============================================================
# dbt_project.yml — Plantilla para el bootcamp
# ============================================================
# Este archivo se crea automáticamente en dbt Cloud con un nombre,
# pero acá te dejo la versión enriquecida con los patrones que
# usarás en los labs.
#
# REGLA DE ORO: configs jerárquicas en este archivo definen DEFAULTS
# por carpeta. Configs en el bloque {{ config() }} de un modelo
# individual GANAN sobre éstas.
# ============================================================

name: 'bootcamp'
version: '1.0.0'
config-version: 2

profile: 'bootcamp'   # debe coincidir con profiles.yml (en Cloud se configura por UI)

# Rutas de carpetas (estos son los defaults, los listamos por claridad)
model-paths:    ["models"]
analysis-paths: ["analyses"]
test-paths:     ["tests"]
seed-paths:     ["seeds"]
macro-paths:    ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:  ["target", "dbt_packages"]

# ============================================================
# VARIABLES GLOBALES
# ============================================================
vars:
  # Fecha límite para análisis incrementales (lab 8)
  start_date: '2024-01-01'

  # Toggle para deshabilitar tests caros en CI (lab 11)
  enable_expensive_tests: true

# ============================================================
# CONFIGURACIÓN DE MODELOS POR CARPETA
# ============================================================
models:
  bootcamp:
    # ─── STAGING ─── Todo como view: ligero, siempre fresco
    staging:
      +materialized: view
      +schema: staging       # se crea como ANALYTICS_staging
      ecommerce:
        +tags: ["ecommerce", "staging"]
      clickstream:
        +tags: ["clickstream", "staging"]
      finance:
        +tags: ["finance", "staging"]

    # ─── INTERMEDIATE ─── Lógica intermedia, no expuesta al usuario
    intermediate:
      +materialized: ephemeral   # CTE, no crea objetos
      +tags: ["intermediate"]

    # ─── MARTS ─── Tablas finales (hechos y dimensiones)
    marts:
      +materialized: table
      +schema: marts
      finance:
        +tags: ["finance", "marts"]
      ecommerce:
        +tags: ["ecommerce", "marts"]
      clickstream:
        +tags: ["clickstream", "marts"]
        # Para clickstream, los modelos pesados son incrementales
        events:
          +materialized: incremental
          +unique_key: event_id
          +on_schema_change: append_new_columns

# ============================================================
# CONFIGURACIÓN DE SEEDS
# ============================================================
seeds:
  bootcamp:
    +schema: raw
    # Snowflake: forzar tipos en columnas críticas para que no las
    # infiera mal (un email "0001" lo trataría como número y perdería el cero)
    ecommerce:
      raw_customers:
        +column_types:
          id: integer
          email: varchar(255)
          signup_date: date
      raw_orders:
        +column_types:
          order_date: date

# ============================================================
# CONFIGURACIÓN DE SNAPSHOTS
# ============================================================
snapshots:
  bootcamp:
    +target_schema: snapshots
    +strategy: timestamp
    +updated_at: updated_at

# ============================================================
# HOOKS GLOBALES (ejecutar SQL antes/después de la corrida)
# ============================================================
on-run-start:
  - "{{ log('🚀 Iniciando corrida ' ~ invocation_id, info=true) }}"

on-run-end:
  - "{{ log('✅ Corrida terminada en ' ~ run_started_at, info=true) }}"
  # Lab 13: dar permisos automáticamente al rol REPORTER
  # - "GRANT SELECT ON ALL TABLES IN SCHEMA {{ target.schema }} TO ROLE REPORTER"

# ============================================================
# ⚠️ ERRORES TÍPICOS DE PRINCIPIANTE
# ============================================================
# 1) Usar +materialized: table en TODA la carpeta staging.
#    Cada `dbt run` reconstruye tablas pesadas innecesariamente.
#    Staging debe ser view casi siempre.
#
# 2) Confundir +tag con +tags:
#    El correcto es +tags (en plural, recibe lista). +tag no existe
#    y dbt lo ignora silenciosamente.
#
# 3) Definir +unique_key sin que el modelo sea incremental:
#    No falla, solo se ignora. Si esperas que dedupliquen tu
#    table, no va a pasar.
#
# 4) Olvidar el prefijo "+":
#    `materialized: view` (sin +) NO se aplica al modelo.
#    El + le dice a dbt "esta config aplica a los descendientes
#    de esta carpeta".
# ============================================================
